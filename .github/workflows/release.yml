name: Release Packages

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to build and upload
        required: true
      source_ref:
        description: Optional source ref for proof builds; leave empty for release tag checkout
        required: false
        default: ""
      platform:
        description: Platform to build; all uploads the GitHub release
        required: true
        default: all
        type: choice
        options:
          - all
          - android-arm64
          - macos-arm64
          - macos-x86_64
          - linux-mips32
          - linux-mips32le
          - linux-mips64
          - linux-mips64le
      prerelease:
        description: Mark the GitHub release as a prerelease
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: never

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    outputs:
      checkout_ref: ${{ steps.resolve.outputs.checkout_ref }}
      matrix: ${{ steps.resolve.outputs.matrix }}
    steps:
      - name: Validate release inputs
        id: resolve
        env:
          RELEASE_TAG: ${{ inputs.tag }}
          SOURCE_REF: ${{ inputs.source_ref }}
          PLATFORM: ${{ inputs.platform }}
        run: |
          python3 - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          import os
          import re
          import sys

          tag = os.environ["RELEASE_TAG"]
          source_ref = os.environ["SOURCE_REF"]
          platform = os.environ["PLATFORM"]
          tag_pattern = re.compile(r"^v[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$")
          ref_pattern = re.compile(r"^(refs/[A-Za-z0-9._/-]+|[A-Za-z0-9._/-]+)$")
          platforms = {
              "all",
              "android-arm64",
              "macos-arm64",
              "macos-x86_64",
              "linux-mips32",
              "linux-mips32le",
              "linux-mips64",
              "linux-mips64le",
          }
          matrix = [
              {"target": "x86_64-unknown-linux-gnu", "friendly_name": "linux-x86_64", "runner": "ubuntu-latest", "build_tool": "zigbuild", "use_cross": False, "skip_smoke": False, "rustflags": ""},
              {"target": "x86_64-unknown-linux-gnu", "friendly_name": "linux-x86_64_v2_sse", "runner": "ubuntu-latest", "build_tool": "cargo", "use_cross": False, "skip_smoke": True, "rustflags": "-C target-cpu=x86-64-v2"},
              {"target": "x86_64-unknown-linux-gnu", "friendly_name": "linux-x86_64_v3_avx2", "runner": "ubuntu-latest", "build_tool": "cargo", "use_cross": False, "skip_smoke": True, "rustflags": "-C target-cpu=x86-64-v3"},
              {"target": "i686-unknown-linux-gnu", "friendly_name": "linux-x86_32", "runner": "ubuntu-latest", "build_tool": "cross", "use_cross": True, "skip_smoke": True, "rustflags": ""},
              {"target": "aarch64-unknown-linux-gnu", "friendly_name": "linux-arm64", "runner": "ubuntu-latest", "build_tool": "zigbuild", "use_cross": False, "skip_smoke": True, "rustflags": ""},
              {"target": "arm-unknown-linux-gnueabi", "friendly_name": "linux-armv5", "runner": "ubuntu-latest", "build_tool": "cross", "use_cross": True, "skip_smoke": True, "rustflags": ""},
              {"target": "arm-unknown-linux-gnueabihf", "friendly_name": "linux-armv6", "runner": "ubuntu-latest", "build_tool": "cross", "use_cross": True, "skip_smoke": True, "rustflags": "-C target-cpu=arm1176jzf-s -C target-feature=-neon"},
              {"target": "armv7-unknown-linux-gnueabihf", "friendly_name": "linux-armv7", "runner": "ubuntu-latest", "build_tool": "zigbuild", "use_cross": False, "skip_smoke": True, "rustflags": ""},
              {"target": "mips-unknown-linux-gnu", "friendly_name": "linux-mips32", "runner": "ubuntu-latest", "build_tool": "cross", "use_cross": True, "skip_smoke": True, "rustflags": ""},
              {"target": "mipsel-unknown-linux-gnu", "friendly_name": "linux-mips32le", "runner": "ubuntu-latest", "build_tool": "cross", "use_cross": True, "skip_smoke": True, "rustflags": ""},
              {"target": "mips64-unknown-linux-gnuabi64", "friendly_name": "linux-mips64", "runner": "ubuntu-latest", "build_tool": "cross", "use_cross": True, "skip_smoke": True, "rustflags": ""},
              {"target": "mips64el-unknown-linux-gnuabi64", "friendly_name": "linux-mips64le", "runner": "ubuntu-latest", "build_tool": "cross", "use_cross": True, "skip_smoke": True, "rustflags": ""},
              {"target": "riscv64gc-unknown-linux-gnu", "friendly_name": "linux-riscv64", "runner": "ubuntu-latest", "build_tool": "cross", "use_cross": True, "skip_smoke": True, "rustflags": ""},
              {"target": "x86_64-apple-darwin", "friendly_name": "macos-x86_64", "runner": "macos-15-intel", "build_tool": "cargo", "use_cross": False, "skip_smoke": True, "rustflags": ""},
              {"target": "aarch64-apple-darwin", "friendly_name": "macos-arm64", "runner": "macos-14", "build_tool": "cargo", "use_cross": False, "skip_smoke": True, "rustflags": ""},
              {"target": "x86_64-pc-windows-msvc", "friendly_name": "windows-x86_64", "runner": "windows-latest", "build_tool": "cargo", "use_cross": False, "skip_smoke": True, "rustflags": ""},
              {"target": "aarch64-pc-windows-msvc", "friendly_name": "windows-arm64", "runner": "windows-latest", "build_tool": "cargo", "use_cross": False, "skip_smoke": True, "rustflags": ""},
              {"target": "aarch64-linux-android", "friendly_name": "android-arm64", "runner": "ubuntu-latest", "build_tool": "cargo", "use_cross": False, "skip_smoke": True, "rustflags": ""},
          ]

          if not tag_pattern.match(tag):
              print(f"invalid release tag: {tag}", file=sys.stderr)
              sys.exit(2)
          if platform not in platforms:
              print(f"invalid platform: {platform}", file=sys.stderr)
              sys.exit(2)
          if source_ref and not ref_pattern.match(source_ref):
              print(f"invalid source ref: {source_ref}", file=sys.stderr)
              sys.exit(2)
          if platform == "all" and source_ref:
              print("source_ref is only allowed for targeted proof builds", file=sys.stderr)
              sys.exit(2)

          selected = matrix if platform == "all" else [row for row in matrix if row["friendly_name"] == platform]
          if not selected:
              print(f"no matrix row for platform: {platform}", file=sys.stderr)
              sys.exit(2)

          checkout_ref = source_ref or f"refs/tags/{tag}"
          print(f"checkout_ref={checkout_ref}")
          print("matrix=" + json.dumps({"include": selected}, separators=(",", ":")))
          PY

  validate:
    needs: validate-tag
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.checkout_ref }}
          persist-credentials: false

      - name: Validate packaging files
        run: scripts/validate-packaging.py

  package:
    needs:
      - validate-tag
      - validate
    name: Package ${{ matrix.friendly_name }}
    runs-on: ${{ matrix.runner }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.validate-tag.outputs.matrix) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.checkout_ref }}
          persist-credentials: false

      - name: Install packaging tools
        run: |
          case "${{ runner.os }}" in
            Linux)
              sudo apt-get update
              sudo apt-get install -y --no-install-recommends jq zip
              ;;
            macOS)
              brew install coreutils jq zip
              echo "/opt/homebrew/opt/coreutils/libexec/gnubin" >> "$GITHUB_PATH"
              echo "/usr/local/opt/coreutils/libexec/gnubin" >> "$GITHUB_PATH"
              ;;
            Windows)
              choco install jq zip -y --no-progress
              ;;
          esac

      - name: Install Rust stable toolchain
        if: ${{ startsWith(matrix.target, 'mips') == false }}
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust nightly toolchain
        if: ${{ startsWith(matrix.target, 'mips') }}
        uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src

      - name: Install Rust target
        run: |
          if [ "${{ matrix.use_cross }}" != "true" ]; then
            rustup target add "${{ matrix.target }}"
          fi

      - name: Set up Android SDK
        if: matrix.target == 'aarch64-linux-android'
        uses: android-actions/setup-android@v3

      - name: Install Android NDK
        if: matrix.target == 'aarch64-linux-android'
        run: |
          ndk_version="26.3.11579264"
          set +o pipefail
          yes | sdkmanager --licenses >/dev/null
          licenses_status="${PIPESTATUS[1]}"
          set -o pipefail
          if [ "$licenses_status" -ne 0 ]; then
            exit "$licenses_status"
          fi
          sdkmanager --install "ndk;$ndk_version"
          ndk_path="$ANDROID_HOME/ndk/$ndk_version"
          toolchain_bin="$ndk_path/toolchains/llvm/prebuilt/linux-x86_64/bin"
          echo "ANDROID_NDK_HOME=$ndk_path" >> "$GITHUB_ENV"
          echo "ANDROID_NDK_ROOT=$ndk_path" >> "$GITHUB_ENV"
          echo "CARGO_TARGET_AARCH64_LINUX_ANDROID_LINKER=$toolchain_bin/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "CC_aarch64_linux_android=$toolchain_bin/aarch64-linux-android24-clang" >> "$GITHUB_ENV"
          echo "AR_aarch64_linux_android=$toolchain_bin/llvm-ar" >> "$GITHUB_ENV"

      - name: Install cross
        if: matrix.use_cross
        uses: taiki-e/install-action@cross

      - name: Install Zig
        if: matrix.build_tool == 'zigbuild'
        uses: mlugg/setup-zig@v1
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        if: matrix.build_tool == 'zigbuild'
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Build package
        env:
          CARGO_BUILD_TOOL: ${{ matrix.build_tool }}
          CARGO_BUILD_FLAGS: ${{ startsWith(matrix.target, 'mips') && '-Zbuild-std=std,panic_abort' || '' }}
          RUSTFLAGS: ${{ matrix.rustflags }}
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          output_dir="release-package-${{ matrix.friendly_name }}"
          args=(
            --target "${{ matrix.target }}"
            --friendly-name "${{ matrix.friendly_name }}"
            --output-dir "$output_dir"
            --version "$RELEASE_TAG"
          )
          if [ "${{ matrix.skip_smoke }}" = "true" ]; then
            args+=(--skip-smoke)
          fi
          scripts/package-release.sh "${args[@]}"

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: zuicity-${{ matrix.friendly_name }}
          path: |
            release-package-${{ matrix.friendly_name }}/*.zip
            release-package-${{ matrix.friendly_name }}/*.zip.dgst
            release-package-${{ matrix.friendly_name }}/*.zip.sha256
            release-package-${{ matrix.friendly_name }}/manifest.txt
            release-package-${{ matrix.friendly_name }}/*.manifest.txt

  source-package:
    needs: validate-tag
    if: ${{ inputs.platform == 'all' }}
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate-tag.outputs.checkout_ref }}
          persist-credentials: false

      - name: Build full source archive
        env:
          RELEASE_TAG: ${{ inputs.tag }}
        run: |
          mkdir -p source-package
          tag="$RELEASE_TAG"
          archive="source-package/zuicity-full-src.zip"
          git archive --format=zip --prefix="zuicity-${tag#v}/" -o "$archive" HEAD
          md5sum "$archive" > "$archive.dgst"
          sha1sum "$archive" >> "$archive.dgst"
          sha256sum "$archive" >> "$archive.dgst"
          sha512sum "$archive" >> "$archive.dgst"
          sha256sum "$archive" > "$archive.sha256"

      - name: Upload source artifact
        uses: actions/upload-artifact@v4
        with:
          name: zuicity-full-src
          path: |
            source-package/zuicity-full-src.zip
            source-package/zuicity-full-src.zip.dgst
            source-package/zuicity-full-src.zip.sha256

  upload-release:
    if: ${{ inputs.platform == 'all' }}
    needs:
      - package
      - source-package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Upload GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: ${{ fromJSON(inputs.prerelease) }}
          files: |
            release/**/*.zip
            release/**/*.zip.dgst
